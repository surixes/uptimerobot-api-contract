spring:
  application:
    name: grpc-sla-calculator-server

# HTTP-порт для Spring Boot (actuator, health)
# Не конфликтует с uptimerobot-api-rest (8080), uptimerobot-incident-service (8081), enrichment-client (8082)
server:
  port: 8083

# Порт gRPC-сервера (отдельный от HTTP!)
# gRPC использует свой собственный сервер на базе Netty,
# который слушает на этом порту независимо от Tomcat.
grpc:
  server:
    port: 9091

# Actuator — проверка здоровья сервиса
management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    root: INFO
    edu.rutmiit: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] %logger{36} - %msg%n"
