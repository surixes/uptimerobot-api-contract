spring:
  application:
    name: grpc-sla-enrichment-client

  # RabbitMQ
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    listener:
      simple:
        retry:
          enabled: true
          initial-interval: 2000    # первая повторная попытка через 2 сек
          max-attempts: 3           # максимум 3 попытки
          multiplier: 2.0           # каждая следующая x2 (2с → 4с → 8с)

# HTTP-порт для Spring Boot (actuator, health)
# Не конфликтует с uptimerobot-api-rest (8080), uptimerobot-incident-service (8081), grpc-sla-calculator-server (8083)
server:
  port: 8082

# gRPC-клиент
# Адрес gRPC-сервера (grpc-sla-calculator-server)
grpc:
  client:
    sla-calculator:
      host: localhost
      port: 9091

sla:
  window:
    rate-ms: 60000

# Actuator — проверка здоровья сервиса
management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    root: INFO
    edu.rutmiit: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] %logger{36} - %msg%n"
