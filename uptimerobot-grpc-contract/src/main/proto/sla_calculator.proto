// Контракт gRPC-сервиса аналитики книг
//
// Определяет сервис BookAnalytics с одним RPC-методом AnalyzeBook.
// Из этого файла protoc + protoc-gen-grpc-java генерируют:
// Классы сообщений - AnalyzeBookRequest, BookAnalysisResponse
// Серверный базовый класс BookAnalyticsGrpc.BookAnalyticsImplBase
// Клиентские стабы BookAnalyticsGrpc.BookAnalyticsBlockingStub

syntax = "proto3";

option java_package = "edu.rutmiit.demo.grpc.sla";
option java_multiple_files = true;

package sla;

service SlaCalculator {
  rpc CalculateSla (CalculateSlaRequest) returns (CalculateSlaResponse);
}

message CalculateSlaRequest {
  int64 check_id = 1;
  string check_name = 2;
  int64 window_started_at_epoch_ms = 3;
  int64 window_ended_at_epoch_ms = 4;
  repeated CheckExecution executions = 5;
}

message CheckExecution {
  string execution_id = 1;
  bool success = 2;
  int32 response_time_ms = 3;
  string failure_reason = 4;
  int64 executed_at_epoch_ms = 5;
}

message CalculateSlaResponse {
  int64 check_id = 1;
  string check_name = 2;
  int32 total_executions = 3;
  int32 success_count = 4;
  int32 failure_count = 5;
  double uptime_percent = 6;
  int32 average_response_time_ms = 7;
  int32 max_response_time_ms = 8;
  string availability_status = 9;
  int64 window_started_at_epoch_ms = 10;
  int64 window_ended_at_epoch_ms = 11;
}
